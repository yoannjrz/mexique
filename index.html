*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--tx);font-size:15px;line-height:1.5}
#app{display:flex;flex-direction:column;height:100vh;padding-top:var(--top)}
header{background:var(--p);color:#fff;padding:10px 16px 9px;flex-shrink:0}
.ht{font-size:17px;font-weight:700;letter-spacing:-.3px}
.hs{font-size:11px;opacity:.72;margin-top:1px}
.hbadge{background:rgba(255,255,255,.22);border-radius:12px;padding:3px 10px;font-size:12px;font-weight:700}
.hbadge2{background:rgba(255,255,255,.12);border-radius:12px;padding:3px 9px;font-size:11px}
main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
.sec{display:none;padding:12px}
.sec.on{display:block}
#s-ma{padding:12px}
nav{background:var(--card);border-top:.5px solid var(--br);padding-bottom:var(--safe);flex-shrink:0;display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
nav::-webkit-scrollbar{display:none}
.nt{flex:1;min-width:52px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:5px 2px;border:none;background:transparent;color:var(--t3);font-family:inherit;cursor:pointer;min-height:var(--tab)}
.nt.on{color:var(--p)}
.nt .ti{font-size:22px}
.nt-l{font-size:10px;font-weight:500;margin-top:1px}
.card{background:var(--card);border-radius:14px;padding:14px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.bdg{display:inline-flex;align-items:center;font-size:11px;padding:3px 9px;border-radius:10px;font-weight:600}
.btn{display:inline-flex;align-items:center;gap:5px;padding:9px 15px;border-radius:10px;border:none;font-family:inherit;font-size:14px;font-weight:500;cursor:pointer}
.sm{padding:7px 11px;font-size:13px}
.bp{background:var(--p);color:#fff}
.bg2{background:var(--pl);color:var(--p)}
.br2{background:var(--rl);color:var(--rd)}
.bo{background:rgba(0,0,0,.07);color:var(--t2)}
.ba2{background:#E8F5F1;color:#0F4A3E}
.lk{display:inline-flex;align-items:center;gap:4px;font-size:12px;padding:5px 10px;border-radius:8px;background:var(--pl);color:var(--p);text-decoration:none;margin:3px 3px 0 0}
.chip{display:inline-block;background:var(--bg);border-radius:8px;padding:4px 10px;font-size:12px;margin:2px 2px 0 0;color:var(--tx)}
.tr2{display:flex;gap:8px;align-items:flex-start;padding:4px 0;font-size:13px;color:var(--t2)}
.inf{background:var(--pl);border-radius:10px;padding:10px 12px;font-size:13px;color:var(--pd);margin-bottom:10px}
.warn{background:var(--rl);border-radius:10px;padding:10px 12px;font-size:13px;color:#B71C1C;margin-bottom:10px}
.sep{height:.5px;background:var(--br);margin:12px 0}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.mt{background:var(--pl);border-radius:12px;padding:14px}
.mt-lbl{font-size:12px;color:var(--pd);margin-bottom:3px}
.mt-val{font-size:22px;font-weight:700;color:var(--p)}
.mt-sub{font-size:11px;color:var(--pd);opacity:.7;margin-top:1px}
.brow{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:.5px solid var(--br);gap:10px}
.brow:last-child{border-bottom:none}
.brow-l{flex:1}
.brow-label{font-size:14px;font-weight:500;color:var(--tx)}
.brow-note{font-size:11px;color:var(--t2);margin-top:1px}
.brow-input{width:90px;text-align:right;font-size:15px;font-weight:600;color:var(--p);border:1.5px solid var(--br);border-radius:8px;padding:6px 8px;background:var(--bg);font-family:inherit;-webkit-appearance:none}
.brow-input:focus{border-color:var(--p);outline:none}
.cr{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:.5px solid var(--br)}
.cr:last-child{border-bottom:none}
.cr input[type=checkbox]{width:20px;height:20px;flex-shrink:0;accent-color:var(--p);margin-top:2px;cursor:pointer}
.cr-txt{flex:1;font-size:14px;line-height:1.4;cursor:pointer}
.cr-del{background:none;border:none;cursor:pointer;color:var(--t3);font-size:20px;padding:0;flex-shrink:0;display:flex;align-items:center}
.dk{text-decoration:line-through;color:var(--t3)}
.del-box{background:var(--rl);border-radius:14px;padding:12px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap}
.pbar{height:6px;background:var(--br);border-radius:3px;overflow:hidden;margin-top:6px}
.pfill{height:100%;background:var(--p);border-radius:3px;transition:width .3s}
.vol-row{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:.5px solid var(--br)}
.vol-row:last-child{border-bottom:none}
.vol-icon{width:36px;height:36px;background:var(--pl);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--p);font-size:18px}
.vol-label{font-size:12px;color:var(--t2);margin-bottom:2px}
.vol-val{font-size:15px;font-weight:500;color:var(--tx)}

.panel.open{transform:translateY(0)}
.phdr{background:var(--card);border-bottom:.5px solid var(--br);padding:11px 14px;display:flex;justify-content:space-between;align-items:center;gap:8px;flex-shrink:0}
.phdr-t{font-weight:600;font-size:15px;text-align:center;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pbody{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px;padding-bottom:40px}
.fl{display:block;font-size:12px;color:var(--t2);margin-bottom:4px;margin-top:14px;font-weight:500}
.fi{width:100%;font-size:15px;padding:11px 13px;border:1.5px solid var(--br);border-radius:10px;background:var(--card);color:var(--tx);font-family:inherit;-webkit-appearance:none;outline:none}
.fi:focus{border-color:var(--p)}
textarea.fi{resize:vertical;min-height:80px;line-height:1.5}
.fi-help{font-size:11px;color:var(--t3);margin-top:3px}
.hbox{border:1px solid var(--br);border-radius:12px;padding:12px;margin-top:10px}
.hbox-t{font-size:13px;font-weight:600;color:var(--t2);margin-bottom:8px;display:flex;align-items:center;gap:6px}

.rt-tl{font-size:10px;color:var(--t2);text-transform:uppercase;letter-spacing:.06em;margin-top:3px}
.rt-row{background:var(--card);border-radius:14px;padding:12px 14px;margin-bottom:8px;box-shadow:0 1px 4px rgba(0,0,0,.07)}

.rt-days{font-size:11px;color:var(--t2)}

.rt-stat.warn{background:#FFF3E0;color:#E65100}
.rt-note{font-size:11px;color:var(--t2);margin-top:5px;padding-top:5px;border-top:.5px solid var(--br);font-style:italic}

.rt-edit-area{margin-top:8px;padding-top:8px;border-top:.5px solid var(--br);display:none}
.rt-edit-area.open{display:block}
.rt-edit-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}

.add-row{display:flex;gap:8px;margin-top:10px}
.add-row .fi{flex:1;padding:9px 12px;font-size:14px}

</head>

function uid(){return Math.random().toString(36).slice(2,9)}
function e(s){return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'):''}
function fmtDate(dt){
  const dn=['Dim.','Lun.','Mar.','Mer.','Jeu.','Ven.','Sam.'];
  const mn=['jan.','fév.','mars','avr.','mai','juin','juil.','août','sept.','oct.','nov.','déc.'];
  return dn[dt.getDay()]+' '+dt.getDate()+' '+mn[dt.getMonth()];
}
function parseDate(str){const[y,m,d]=str.split('-').map(Number);return new Date(y,m-1,d);}
function cd(dateStr){
  const dep=parseDate(dateStr||'2026-11-15');
  const now=new Date();now.setHours(0,0,0,0);
  const d=Math.ceil((dep-now)/86400000);
  return d>0?'J-'+d:d===0?'Auj.!':'Parti ✓';
}

// ===== STORAGE =====
function save(){
  try{
    localStorage.setItem('yuc26d',JSON.stringify(S.days));
    localStorage.setItem('yuc26h',JSON.stringify(S.hotels));
    localStorage.setItem('yuc26b',JSON.stringify(S.budget));
    localStorage.setItem('yuc26f',JSON.stringify(S.flight));
    localStorage.setItem('yuc26c',JSON.stringify(S.checklist));
  }catch(err){}
}
function load(){
  try{const v=localStorage.getItem('yuc26d');if(v)S.days=JSON.parse(v);}catch(e){}
  try{const v=localStorage.getItem('yuc26h');if(v)S.hotels=JSON.parse(v);}catch(e){}
  try{const v=localStorage.getItem('yuc26b');if(v)S.budget=JSON.parse(v);}catch(e){}
  try{const v=localStorage.getItem('yuc26f');if(v)S.flight=JSON.parse(v);}catch(e){}
  try{const v=localStorage.getItem('yuc26c');if(v)S.checklist=JSON.parse(v);}catch(e){}
  if(!S.days)S.days=JSON.parse(JSON.stringify(DEF_DAYS));
  if(!S.hotels)S.hotels=JSON.parse(JSON.stringify(DEF_HOTELS));
  if(!S.budget)S.budget=JSON.parse(JSON.stringify(DEF_BUDGET));
  if(!S.flight)S.flight=JSON.parse(JSON.stringify(DEF_FLIGHT));
  if(!S.checklist)S.checklist=JSON.parse(JSON.stringify(DEF_CHECKLIST));
}

// ===== DATES =====
function recalcDates(){
  if(!S.flight||!S.flight.date)return;
  const base=parseDate(S.flight.date);
  S.days.forEach((d,i)=>{
    const dt=new Date(base.getTime());dt.setDate(base.getDate()+i);
    d.dt=fmtDate(dt);
  });
}

// ===== HEADER =====
function rHdr(){
  const km=S.days.reduce((s,d)=>s+(d.km||0),0);
  const dep=S.flight?S.flight.date:'2026-11-15';
  const ret=S.flight?S.flight.returnDate:'2026-11-29';
  document.getElementById('hds').textContent=S.days.length+' étapes · ~'+km+' km · 2 voyageurs';
  document.getElementById('jcd').textContent=cd(dep);
  const d1=S.days[0]?S.days[0].dt:'';
  const dn=S.days[S.days.length-1]?S.days[S.days.length-1].dt:'';
  document.getElementById('hdates').textContent=d1+' – '+dn;
}

function sw(id,btn){
  TABS.forEach(t=>{const el=document.getElementById('s-'+t[0]);if(el)el.className='sec'+(t[0]===id?' on':'');});

  btn.classList.add('on');
  if(id==='ma')setTimeout(()=>{iMap();uMap();},80);

function fmtSec(sec){
  if(!sec||sec<=0)return null;
  const h=Math.floor(sec/3600),m=Math.round((sec%3600)/60);
  return h>0?(m>0?`${h}h${String(m).padStart(2,'0')}`:`${h}h`):m+'min';
}
function fmtKm(m){return Math.round(m/1000);}

// Geocoding : DB locale → Nominatim → Photon → erreur explicite
async function geocode(city){
  if(!city)return null;
  const k=city.toLowerCase().trim();
  if(_geoCache[k])return _geoCache[k];
  // 1. DB locale (instantané)
  if(GEO_DB[k])return (_geoCache[k]=GEO_DB[k]);
  // Aussi tester sans accents
  const kn=k.normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  if(GEO_DB[kn])return (_geoCache[k]=GEO_DB[kn]);
  // 2. Nominatim (fonctionne depuis HTTPS, pas depuis file://)
  const queries=[
    `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(city+', Yucatan, Mexico')}&format=json&limit=1&countrycodes=mx`,
    `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(city+', Mexico')}&format=json&limit=1&countrycodes=mx`,
  ];
  for(const url of queries){
    try{
      const r=await fetch(url,{headers:{'Accept-Language':'es,fr'}});
      const d=await r.json();
      if(d&&d[0]){const res={lat:parseFloat(d[0].lat),lng:parseFloat(d[0].lon)};_geoCache[k]=res;return res;}
    }catch(err){}
  }
  // 3. Photon fallback
  try{
    const r=await fetch(`https://photon.komoot.io/api/?q=${encodeURIComponent(city)}&limit=3&lang=fr&bbox=-91,17,-85,22`);
    const d=await r.json();
    // Filtrer sur le Mexique (country_code=mx)
    const f=d&&d.features&&d.features.find(x=>x.properties&&(x.properties.country_code==='mx'||x.properties.country==='Mexico'||x.properties.country==='Mexique'));
    if(f){const[lng,lat]=f.geometry.coordinates;const res={lat,lng};_geoCache[k]=res;return res;}
    // Prendre le premier si rien de mieux
    if(d&&d.features&&d.features[0]){const[lng,lat]=d.features[0].geometry.coordinates;const res={lat,lng};_geoCache[k]=res;return res;}
  }catch(err){}
  return null;
}

async function getRoute(fromCoord,toCoord){
  const k=`${fromCoord.lat.toFixed(4)},${fromCoord.lng.toFixed(4)}|${toCoord.lat.toFixed(4)},${toCoord.lng.toFixed(4)}`;
  if(_routeCache[k])return _routeCache[k];
  // 1. OSRM
  try{
    const url=`https://router.project-osrm.org/route/v1/driving/${fromCoord.lng},${fromCoord.lat};${toCoord.lng},${toCoord.lat}?overview=false`;
    const r=await fetch(url);
    const d=await r.json();
    if(d&&d.routes&&d.routes[0]){
      const res={km:fmtKm(d.routes[0].distance),sec:Math.round(d.routes[0].duration),src:'OSRM'};
      _routeCache[k]=res;return res;
    }
  }catch(err){}
  // 2. Fallback Haversine (vol d'oiseau × 1.35 pour routes yucatèques)
  const R=6371;
  const dLat=(toCoord.lat-fromCoord.lat)*Math.PI/180;
  const dLng=(toCoord.lng-fromCoord.lng)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(fromCoord.lat*Math.PI/180)*Math.cos(toCoord.lat*Math.PI/180)*Math.sin(dLng/2)**2;
  const crow=R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
  const km=Math.round(crow*1.35);
  const sec=Math.round(km/65*3600);
  const res={km,sec,src:'estimation'};
  _routeCache[k]=res;return res;
}

function setRtLoading(n,loading){
  const btn=document.getElementById('rte-calc-btn-'+n);
  if(!btn)return;
  btn.disabled=loading;
  btn.innerHTML=loading
    ?'<i class="ti ti-loader" style="animation:spin .8s linear infinite;display:inline-block"></i> Calcul en cours...'
    :'<i class="ti ti-route"></i> Calculer automatiquement';
}

async function autoCalcRoute(n){
  const idx=S.days.findIndex(d=>d.n===n);
  if(idx<0)return;
  const toVal=document.getElementById('rte-to-'+n)?.value.trim();
  const frVal=document.getElementById('rte-fr-'+n)?.value.trim();
  if(!frVal){showRtMsg(n,'Renseignez la ville de départ d\'abord.','warn');return;}
  setRtLoading(n,true);
  showRtMsg(n,'Géocodage des villes…','info');
  const [fromCoord,toCoord]=await Promise.all([geocode(frVal),geocode(toVal||S.days[idx].to)]);
  if(!fromCoord||!toCoord){
    setRtLoading(n,false);
    showRtMsg(n,'Ville introuvable. Vérifiez l\'orthographe (ex: Merida, Tulum…).','warn');return;
  }
  showRtMsg(n,'Calcul de l\'itinéraire routier…','info');
  const route=await getRoute(fromCoord,toCoord);
  setRtLoading(n,false);
  if(!route){showRtMsg(n,'Impossible de calculer l\'itinéraire. Réessayez.','warn');return;}
  const kmEl=document.getElementById('rte-km-'+n);
  const tmEl=document.getElementById('rte-tm-'+n);
  const laEl=document.getElementById('rte-la-'+n);
  const lnEl=document.getElementById('rte-ln-'+n);
  if(kmEl)kmEl.value=route.km;
  if(tmEl)tmEl.value=fmtSec(route.sec);
  if(laEl)laEl.value=toCoord.lat.toFixed(5);
  if(lnEl)lnEl.value=toCoord.lng.toFixed(5);
  S._pending=S._pending||{};
  S._pending[n]={km:route.km,sec:route.sec,lat:toCoord.lat,lng:toCoord.lng};
  showRtMsg(n,`✅ ${route.km} km · ${fmtSec(route.sec)}${route.src==='estimation'?' (estimation vol d\'oiseau ×1.35)':' · OSRM'}`,'ok');
}

function showRtMsg(n,msg,type){
  const el=document.getElementById('rte-msg-'+n);

  const colors={info:'var(--pl)',warn:'var(--rl)',ok:'#E8F5E9'};
  const texts={info:'var(--pd)',warn:'#B71C1C',ok:'#1B5E20'};
  el.style.display='block';
  el.style.background=colors[type]||colors.info;
  el.style.color=texts[type]||texts.info;
  el.textContent=msg;
}

// ===== AJOUT / SUPPRESSION DEPUIS LA CARTE =====
async function autoCalcNew(){
  const toVal=document.getElementById('new-to')?.value.trim();
  const frVal=document.getElementById('new-fr')?.value.trim();
  const btn=document.getElementById('new-calc-btn');
  const msgEl=document.getElementById('new-msg');
  const show=(msg,type)=>{if(!msgEl)return;const colors={info:'var(--pl)',warn:'var(--rl)',ok:'#E8F5E9'};const texts={info:'var(--pd)',warn:'#B71C1C',ok:'#1B5E20'};msgEl.style.display='block';msgEl.style.background=colors[type];msgEl.style.color=texts[type];msgEl.textContent=msg;};
  if(!toVal){show('Renseignez la destination.','warn');return;}
  if(btn){btn.disabled=true;btn.innerHTML='<i class="ti ti-loader" style="animation:spin .8s linear infinite;display:inline-block"></i> Calcul...';}
  show('Géocodage…','info');
  const destCoord=await geocode(toVal);
  const fromCoord=frVal?await geocode(frVal):null;
  if(!destCoord){if(btn){btn.disabled=false;btn.innerHTML='<i class="ti ti-route"></i> Calculer automatiquement';}show('Destination introuvable.','warn');return;}
  let km=0,sec=0;
  if(fromCoord){
    show('Calcul itinéraire…','info');
    const route=await getRoute(fromCoord,destCoord);
    if(route){km=route.km;sec=route.sec;}
  }
  if(btn){btn.disabled=false;btn.innerHTML='<i class="ti ti-route"></i> Calculer automatiquement';}
  const kmEl=document.getElementById('new-km');const tmEl=document.getElementById('new-tm');
  const laEl=document.getElementById('new-la');const lnEl=document.getElementById('new-ln');
  if(kmEl)kmEl.value=km;
  if(tmEl)tmEl.value=sec?fmtSec(sec):'—';
  if(laEl)laEl.value=destCoord.lat.toFixed(5);
  if(lnEl)lnEl.value=destCoord.lng.toFixed(5);
  show(km>0?`✅ ${km} km · ${fmtSec(sec)}`:'✅ Coordonnées trouvées (journée sur place)','ok');
  S._newPend={km,sec,lat:destCoord.lat,lng:destCoord.lng};
}

function confirmAddDay(){
  const to=document.getElementById('new-to')?.value.trim();
  if(!to){document.getElementById('new-msg').style.display='block';document.getElementById('new-msg').textContent='Destination requise.';return;}
  const fr=document.getElementById('new-fr')?.value.trim()||null;
  const km=parseInt(document.getElementById('new-km')?.value)||0;
  const la=parseFloat(document.getElementById('new-la')?.value)||20;
  const ln=parseFloat(document.getElementById('new-ln')?.value)||-88;
  const pend=S._newPend||{};
  const sec=pend.sec||0;
  const mx=Math.max(...S.days.map(d=>d.n),0);
  const base=S.flight?parseDate(S.flight.date):new Date('2026-11-15');
  const dt=new Date(base.getTime());dt.setDate(base.getDate()+mx);
  S.days.push({n:mx+1,dt:fmtDate(dt),to,from:fr||null,km,sec,lat:la,lng:ln,tag:'Étape',c:'gray',hl:[],ti:[],fd:'',sl:'',lk:[]});
  S._newPend=null;
  save();rIt();rHdr();uMap();
}

function delDayFromMap(n){
  const day=S.days.find(d=>d.n===n);
  if(!day||!confirm('Supprimer J'+n+' — '+day.to+' ?'))return;
  S.days=S.days.filter(d=>d.n!==n);
  save();rIt();rHdr();uMap();
}

function addDayFromMap(){
  const form=document.getElementById('rt-add-form');
  const btn=document.getElementById('rt-add-btn');
  if(form)form.style.display='block';
  if(btn)btn.style.display='none';
  const inp=document.getElementById('new-to');
  if(inp)inp.focus();
}

function toggleRtEdit(n){
  const el=document.getElementById('rtedit-'+n);
  if(!el)return;
  const open=el.classList.contains('open');
  document.querySelectorAll('.rt-edit-area.open').forEach(x=>x.classList.remove('open'));
  if(!open)el.classList.add('open');
}

function saveRtEdit(n){
  const idx=S.days.findIndex(d=>d.n===n);
  if(idx<0)return;
  const to=document.getElementById('rte-to-'+n)?.value.trim()||S.days[idx].to;
  const fr=document.getElementById('rte-fr-'+n)?.value.trim()||null;
  const dy=document.getElementById('rte-dy-'+n)?.value.trim()||null;
  const km=parseInt(document.getElementById('rte-km-'+n)?.value)||0;
  const la=parseFloat(document.getElementById('rte-la-'+n)?.value)||S.days[idx].lat;
  const ln=parseFloat(document.getElementById('rte-ln-'+n)?.value)||S.days[idx].lng;
  const pend=S._pending&&S._pending[n];
  const sec=pend?pend.sec:(S.days[idx].sec||0);
  S.days[idx]={...S.days[idx],to,from:fr||null,day:dy,km,sec,lat:la,lng:ln};
  if(S._pending)delete S._pending[n];
  save();rIt();rHdr();uMap();
  setTimeout(()=>{const r=document.getElementById('rtrow-'+n);if(r)r.scrollIntoView({behavior:'smooth',block:'center'});},100);
}

        <input class="brow-input" type="number" value="${Math.round(it.val)}" onchange="updBudget('${it.id}',this.value)" min="0">
        <span style="font-size:13px;color:var(--t2)">€</span>
      </div>
    </div>`).join('')}
  </div>
  <div style="display:flex;justify-content:space-between;align-items:center;padding:0 2px">
    <div style="font-size:13px;color:var(--t2)">1€ ≈ 21-22 MXN · Hors dépenses imprévues</div>
    <button class="btn bo sm" onclick="resetBudget()"><i class="ti ti-refresh"></i> Réinitialiser</button>
  </div>
  `;
}
function updBudget(id,val){
  const item=S.budget.find(b=>b.id===id);
  if(item){item.val=parseFloat(val)||0;save();
    const items=S.budget;
    const total=items.reduce((s,i)=>s+(parseFloat(i.val)||0),0);
    // Update totals without re-rendering all
  }
}
function resetBudget(){if(confirm('Réinitialiser le budget aux valeurs par défaut ?')){S.budget=JSON.parse(JSON.stringify(DEF_BUDGET));S.budget.find(b=>b.id==='flights').val=(S.flight.pricePP||0)*2;save();rBu();}}

// ===== GASTRONOMIE =====
function rGa(){
  document.getElementById('s-ga').innerHTML=GAST.map(g=>`<div class="card"><div style="font-weight:600;font-size:15px;margin-bottom:8px;padding-bottom:6px;border-bottom:.5px solid var(--br)">${g.city}</div>${g.dishes.map(d=>`<div style="display:flex;gap:8px;align-items:flex-start;padding:4px 0;font-size:14px"><i class="ti ti-circle-check" style="font-size:15px;color:var(--p);flex-shrink:0;margin-top:1px"></i><span>${e(d)}</span></div>`).join('')}<div style="background:var(--bg);border-radius:8px;padding:8px;font-size:12px;color:var(--t2);margin-top:8px"><i class="ti ti-map-pin"></i> <strong style="color:var(--tx)">Où manger :</strong> ${e(g.where)}</div></div>`).join('');
}

// ===== CHECKLIST AVEC CRUD =====
function rCh(){
  const cl=S.checklist;
  let total=0,done=0;
  cl.forEach(cat=>cat.items.forEach(it=>{total++;if(it.done)done++;}));
  const pct=total?Math.round(done/total*100):0;
  let h=`
  <div class="card" style="margin-bottom:12px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
      <span style="font-weight:600;font-size:15px">${done}/${total} complété</span>
      <span style="font-size:15px;font-weight:700;color:${pct===100?'var(--p)':'var(--t2)'}">${pct}%</span>
    </div>
    <div class="pbar"><div class="pfill" style="width:${pct}%"></div></div>
  </div>`;
  cl.forEach((cat,ci)=>{
    h+=`<div class="card" style="margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:2px">
        <div style="font-weight:600;font-size:15px">${e(cat.cat)}</div>
        <button class="btn br2 sm" onclick="delChCat(${ci})" style="padding:4px 8px;font-size:12px"><i class="ti ti-trash"></i> Catégorie</button>
      </div>
      <div class="sep"></div>`;
    cat.items.forEach(it=>{
      h+=`<div class="cr">
        <input type="checkbox" ${it.done?'checked':''} onchange="togCh(${ci},'${it.id}')">
        <label class="cr-txt ${it.done?'dk':''}" for="">${e(it.text)}</label>
        <button class="cr-del" onclick="delChItem(${ci},'${it.id}')"><i class="ti ti-x" style="font-size:16px"></i></button>
      </div>`;
    });
    h+=`<div class="add-row" style="margin-top:8px">
      <input class="fi" placeholder="Ajouter un item..." id="ni-${ci}" style="padding:8px 12px;font-size:14px" onkeydown="if(event.key==='Enter')addChItem(${ci})">
      <button class="btn bp sm" onclick="addChItem(${ci})"><i class="ti ti-plus"></i></button>
    </div></div>`;
  });
  h+=`<div class="add-row" style="margin-top:4px">
    <input class="fi" placeholder="Nouvelle catégorie..." id="new-cat" style="padding:8px 12px;font-size:14px" onkeydown="if(event.key==='Enter')addChCat()">
    <button class="btn bp" onclick="addChCat()"><i class="ti ti-plus"></i> Catégorie</button>
  </div>`;
  document.getElementById('s-ch').innerHTML=h;
}
function togCh(ci,id){
  const item=S.checklist[ci].items.find(x=>x.id===id);
  if(item){item.done=!item.done;save();rCh();}
}
function delChItem(ci,id){
  S.checklist[ci].items=S.checklist[ci].items.filter(x=>x.id!==id);
  save();rCh();
}
function addChItem(ci){
  const inp=document.getElementById('ni-'+ci);
  const txt=inp?inp.value.trim():'';
  if(!txt)return;
  S.checklist[ci].items.push({id:uid(),text:txt,done:false});
  save();rCh();
  // Refocus
  setTimeout(()=>{const el=document.getElementById('ni-'+ci);if(el)el.focus();},100);
}
function addChCat(){
  const inp=document.getElementById('new-cat');
  const txt=inp?inp.value.trim():'';
  if(!txt)return;
  S.checklist.push({cat:txt,items:[]});
  save();rCh();
}
function delChCat(ci){
  if(!confirm('Supprimer la catégorie "'+S.checklist[ci].cat+'" et tous ses items ?'))return;
  S.checklist.splice(ci,1);save();rCh();
}

  ${PRAT.map(p=>`<div class="card" style="margin-bottom:10px"><div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;padding-bottom:6px;border-bottom:.5px solid var(--br)"><i class="ti ${p.ic}" style="font-size:20px;color:var(--t2)"></i><span style="font-weight:600;font-size:15px">${p.tl}</span></div>${p.it.map(x=>`<div style="display:flex;gap:8px;align-items:flex-start;padding:4px 0;font-size:14px;color:var(--tx)"><i class="ti ti-arrow-right" style="font-size:12px;flex-shrink:0;margin-top:3px;color:var(--t3)"></i><span>${e(x)}</span></div>`).join('')}</div>`).join('')}
  <div class="inf" style="font-size:12px">
    <i class="ti ti-alert-circle"></i>
    <span><strong>911</strong> Urgences Mexique · <strong>+52 55 9171 9700</strong> Ambassade FR · <strong>+52 999 481 9576</strong> Terra Maya 24h</span>
  </div>
  <div style="margin-top:16px;padding:12px;text-align:center;border-radius:12px;background:var(--bg)">
    <div style="font-size:12px;color:var(--t2);margin-bottom:8px">Données sauvegardées localement sur cet appareil</div>
    <button class="btn bo" onclick="resetAll()"><i class="ti ti-refresh"></i> Réinitialiser toutes les données</button>
  </div>
  `;
}

function cp(t){document.getElementById('p'+t).classList.remove('open');document.body.style.overflow='';S._editMode=null;}

function rAll(){
  recalcDates();
  rHdr();rTabs();
  rVol();rIt();rHb();rBu();rGa();rCh();rPr();
}
load();rAll();
